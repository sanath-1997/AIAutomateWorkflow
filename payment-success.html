<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            color: #171717;
            text-align: center;
        }

        .message {
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="message">
        <h1>Confirming your payment</h1>
        <p>Please wait while we open your content...</p>
    </div>

    <script>
        const parameters = new URLSearchParams(window.location.search);
        const paymentId = parameters.get("razorpay_payment_id");

        if (paymentId) {
            const accessDetails = {
                paid: true,
                paymentId: paymentId,
                unlockedAt: new Date().toISOString()
            };

            localStorage.setItem(
                "paidContentAccess",
                JSON.stringify(accessDetails)
            );

            window.location.replace("final-page.html");
        } else {
            document.querySelector(".message").innerHTML = `
                <h1>Payment not confirmed</h1>
                <p>Please complete the payment before accessing the content.</p>
                <a href="index.html">Return to payment page</a>
            `;
        }
    </script>
</body>
</html>
