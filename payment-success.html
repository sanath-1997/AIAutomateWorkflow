<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            color: #171717;
            text-align: center;
        }

        .message {
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="message">
        <h1>Confirming your payment</h1>
        <p>Please wait while we open your content...</p>
    </div>

    <script>
     
    const accessDetails = {
        paid: true,
        unlockedAt: new Date().toISOString()
    };

    localStorage.setItem(
        "paidContentAccess",
        JSON.stringify(accessDetails)
    );

    window.location.replace("final-page.html");

    </script>
</body>
</html>
